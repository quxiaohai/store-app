<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=contain"/>
  <meta name="apple-mobile-web-app-title" content="云鲸"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>云鲸智能-500</title>
  <style>
      body {
          background-color: #ffffff;
      }

      .m-default-full {
          text-align: center;
          width: 100%;
          position: absolute;
          left: 50%;
          top: 40%;
          transform: translate(-50%, -50%);
          background-color: #ffffff;
      }

      .m-default-full .image {
          width: 60%;
          background: none;
      }

      .m-default-full .desc {
          margin: 22px auto 0;
          max-width: 90vw;
          word-break: break-word;
          line-height: 20px;
          font-size: 16px;
          color: #666666;
      }

      .m-default-full .btn {
          width: 100px;
          height: 40px;
          border-radius: 40px;
          border: 1px solid #683DF5;
          color: #683DF5;
          font-size: 16px;
          text-align: center;
          line-height: 40px;
          box-sizing: border-box;
          margin: 30px auto 0;
          display: block;
          text-decoration: none;
      }
  </style>
</head>
<body>
<div class="m-default-full">
  <img alt="" src="/assets/images/common/500.png" class="image"/>
  <p class="desc">网络开小差了，请稍后再试~</p>
  <a class="btn" href="/index">回到首页</a>
</div>
</body>
</html>
